<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ESP32-CAM Detektor Barang | Localhost Ready</title>
    <!-- TensorFlow.js dan COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(10, 18, 30, 0.85);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid #2a4a6e;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #aaffff, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .status {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0 1rem;
        }
        .led {
            background: #0f1424;
            padding: 5px 15px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5555;
        }
        .dot.green { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
        .camera-box {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin: 1rem 0;
            aspect-ratio: 16 / 9;
            border: 1px solid cyan;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        video { z-index: 1; transform: scaleX(-1); }
        canvas { z-index: 2; pointer-events: none; }
        .placeholder {
            position: absolute;
            inset: 0;
            background: #050a14ee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 3;
            border-radius: 24px;
            text-align: center;
            color: white;
        }
        button {
            background: #1e2f4b;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background: #2c4870; }
        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: #0b1120aa;
            padding: 10px 18px;
            border-radius: 40px;
            margin: 1rem 0;
        }
        .badge { background: #03081a80; padding: 4px 15px; border-radius: 32px; color: #bbd9ff; }
        .detection-panel {
            background: #0a0f1acc;
            border-radius: 1.5rem;
            padding: 1rem;
            border-left: 4px solid #0af;
        }
        #detectedList {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            margin-top: 10px;
        }
        .item {
            background: #111a2a;
            padding: 5px 16px;
            border-radius: 40px;
            border: 1px solid #2f608b;
            font-size: 0.85rem;
        }
        .error-msg { color: #ffaa99; font-size: 0.8rem; margin-top: 0.5rem; }
        .footer { text-align: center; font-size: 0.7rem; color: #5f7f9e; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 ESP-AI Vision • Deteksi Barang</h1>
    <div class="status">
        <div class="led"><div class="dot" id="camLed"></div><span>KAMERA</span></div>
        <div class="led"><div class="dot" id="aiLed"></div><span>AI MODEL</span></div>
    </div>

    <div class="camera-box">
        <video id="video" autoplay playsinline muted style="display: none;"></video>
        <canvas id="canvas"></canvas>
        <div id="placeholder" class="placeholder">
            <span>📷 Siap Deteksi Barang</span>
            <button id="startBtn">🎥 AKTIFKAN KAMERA</button>
            <span style="font-size:0.7rem;">Pastikan beri izin kamera</span>
        </div>
    </div>

    <div class="info-bar">
        <div class="badge">🧠 Model: COCO-SSD (90 kelas)</div>
        <div class="badge" id="fpsText">⚡ Status: Menunggu</div>
        <div class="badge">📦 Objek: <span id="objCount">0</span></div>
    </div>

    <div class="detection-panel">
        <h3 style="color:#8bcbff;">🔍 Barang Teridentifikasi</h3>
        <ul id="detectedList"><li style="color:#7a9bc2;">✨ Tekan tombol untuk mulai</li></ul>
    </div>
    <div class="footer">🔒 Wajib akses via http://localhost atau HTTPS | Izin kamera diperlukan</div>
</div>

<script>
    // ========== ELEMEN ==========
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const placeholderDiv = document.getElementById('placeholder');
    const startBtn = document.getElementById('startBtn');
    const camLed = document.getElementById('camLed');
    const aiLed = document.getElementById('aiLed');
    const fpsText = document.getElementById('fpsText');
    const objCountSpan = document.getElementById('objCount');
    const detectedList = document.getElementById('detectedList');

    // ========== GLOBAL ==========
    let model = null;
    let isModelLoading = false;
    let detectionActive = false;
    let animationId = null;
    let mediaStream = null;
    let lastFpsTime = 0;
    let frameCount = 0;
    let isDetecting = false;

    // ========== HELPER LED ==========
    function setCamLed(active) {
        if (active) camLed.classList.add('green');
        else camLed.classList.remove('green');
    }
    function setAiLed(ready) {
        if (ready) aiLed.classList.add('green');
        else aiLed.classList.remove('green');
    }

    // ========== RESIZE CANVAS ==========
    function resizeCanvas() {
        if (video.videoWidth && video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        } else {
            const rect = document.querySelector('.camera-box').getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
    }

    // ========== DRAW BOUNDING BOX (mirror fix) ==========
    function drawPredictions(predictions) {
        if (!canvas.width || !canvas.height) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!predictions.length) return;
        for (let p of predictions) {
            let [x, y, w, h] = p.bbox;
            // flip karena video mirror
            x = canvas.width - (x + w);
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            if (w <= 0 || h <= 0) continue;
            ctx.strokeStyle = '#0afff0';
            ctx.lineWidth = 2.5;
            ctx.strokeRect(x, y, w, h);
            const label = `${p.class} ${Math.round(p.score * 100)}%`;
            ctx.font = `bold ${Math.max(14, canvas.width/35)}px "Segoe UI"`;
            const tw = ctx.measureText(label).width;
            ctx.fillStyle = '#000000aa';
            ctx.fillRect(x-2, y-26, tw+12, 24);
            ctx.fillStyle = '#fff';
            ctx.fillText(label, x, y-10);
        }
    }

    // update daftar barang unik
    function updateDetectedList(predictions) {
        if (!predictions.length) {
            objCountSpan.innerText = '0';
            detectedList.innerHTML = '<li style="color:#7a9bc2;">✨ Tidak ada objek terdeteksi</li>';
            return;
        }
        const map = new Map();
        for (let p of predictions) {
            if (!map.has(p.class) || map.get(p.class).score < p.score) {
                map.set(p.class, p);
            }
        }
        const items = Array.from(map.values());
        objCountSpan.innerText = items.length;
        detectedList.innerHTML = '';
        items.forEach(item => {
            const li = document.createElement('li');
            li.className = 'item';
            li.innerHTML = `<strong>📦 ${item.class}</strong> <span style="color:#5fc3ff;">${Math.round(item.score*100)}%</span>`;
            detectedList.appendChild(li);
        });
    }

    // ========== PROSES DETEKSI ==========
    async function runDetection() {
        if (!model || !video.videoWidth || video.paused || !detectionActive) return;
        if (isDetecting) return;
        isDetecting = true;
        try {
            const preds = await model.detect(video);
            drawPredictions(preds);
            updateDetectedList(preds);
            // FPS
            const now = performance.now();
            frameCount++;
            if (now - lastFpsTime >= 1000) {
                fpsText.innerText = `⚡ FPS: ${frameCount} | Live`;
                frameCount = 0;
                lastFpsTime = now;
            }
        } catch (err) {
            console.warn(err);
        } finally {
            isDetecting = false;
        }
    }

    function detectionLoop() {
        if (!detectionActive) return;
        runDetection().catch(e => console.warn(e));
        animationId = requestAnimationFrame(detectionLoop);
    }

    // ========== STOP KAMERA ==========
    async function stopCamera() {
        detectionActive = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        video.srcObject = null;
        video.style.display = 'none';
        canvas.style.display = 'none';
        placeholderDiv.style.display = 'flex';
        setCamLed(false);
        fpsText.innerText = '⏸ Kamera mati';
    }

    // ========== START KAMERA + DETEKSI (DENGAN HANDLER PERIZINAN YANG JELAS) ==========
    async function startCamera() {
        // reset jika sudah berjalan
        if (mediaStream) await stopCamera();
        
        setCamLed(false);
        placeholderDiv.innerHTML = `<span>🔍 Meminta akses kamera...</span><div style="font-size:0.7rem;">Izinkan permission kamera</div>`;
        
        try {
            // Konfigurasi: prioritas kamera belakang jika ada, resolusi standar
            const constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: { ideal: "environment" }
                }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            mediaStream = stream;
            video.srcObject = stream;
            await video.play();
            // Tunggu metadata
            await new Promise((resolve) => {
                if (video.videoWidth > 0) resolve();
                else video.addEventListener('loadedmetadata', () => resolve(), { once: true });
            });
            
            video.style.display = 'block';
            canvas.style.display = 'block';
            placeholderDiv.style.display = 'none';
            resizeCanvas();
            setCamLed(true);
            
            // Mulai detection loop
            detectionActive = true;
            if (animationId) cancelAnimationFrame(animationId);
            lastFpsTime = performance.now();
            frameCount = 0;
            animationId = requestAnimationFrame(detectionLoop);
            fpsText.innerText = '🟢 Deteksi aktif (mirror ON)';
            
            // Jika model belum selesai load, tunggu sebentar (tidak masalah)
            if (!model) {
                fpsText.innerText = '⏳ Menunggu model AI...';
            }
        } catch (err) {
            console.error(err);
            let pesan = err.message;
            if (err.name === 'NotAllowedError') pesan = 'Izin kamera ditolak. Klik ikon kamera di address bar dan izinkan.';
            else if (err.name === 'NotFoundError') pesan = 'Tidak ada kamera yang terdeteksi.';
            placeholderDiv.innerHTML = `
                <span>⚠️ Gagal akses kamera</span>
                <span style="font-size:0.8rem; color:#ffaa99;">${pesan}</span>
                <button id="startBtn">🔄 COBA LAGI</button>
            `;
            const newBtn = document.getElementById('startBtn');
            if (newBtn) newBtn.addEventListener('click', startCamera);
            setCamLed(false);
        }
    }

    // ========== LOAD MODEL TENSORFLOW ==========
    async function loadModel() {
        if (model) return model;
        if (isModelLoading) {
            while (isModelLoading) await new Promise(r => setTimeout(r, 100));
            return model;
        }
        isModelLoading = true;
        setAiLed(false);
        fpsText.innerText = '🧠 Memuat AI Model...';
        try {
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            setAiLed(true);
            fpsText.innerText = '✅ Model siap. Klik "Aktifkan Kamera"';
            console.log("Model loaded");
            return model;
        } catch (err) {
            console.error(err);
            setAiLed(false);
            fpsText.innerText = '❌ Gagal load model';
            placeholderDiv.innerHTML = `<span>❌ Model AI gagal dimuat. Cek koneksi internet.</span><button id="startBtn">Refresh Halaman</button>`;
            const refreshBtn = document.getElementById('startBtn');
            if (refreshBtn) refreshBtn.addEventListener('click', () => location.reload());
            return null;
        } finally {
            isModelLoading = false;
        }
    }

    // ========== INIT ==========
    (async () => {
        await loadModel();
        if (model) {
            setAiLed(true);
        }
        // Tombol start
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.innerText = 'Memulai...';
            if (!model) await loadModel();
            await startCamera();
            startBtn.disabled = false;
            if (mediaStream) startBtn.innerText = '✅ Kamera Aktif';
            else startBtn.innerText = '🎥 Aktifkan Kamera';
        });
    })();

    // Resize handler
    window.addEventListener('resize', () => { if (video.videoWidth) resizeCanvas(); });
    video.addEventListener('resize', resizeCanvas);
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (animationId) cancelAnimationFrame(animationId);
    });
</script>
</body>
</html>
